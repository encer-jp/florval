florval:
  schema_path: openapi.yaml
  output_directory: generated

  client:
    base_url_env: API_BASE_URL
    timeout: 30000

  riverpod:
    enabled: true
    auto_invalidate: true
    pagination:
      # インラインobject → ラッパーモデル(ListTasksPage)が自動生成される
      - operation_id: listTasks
        cursor_param: after
        next_cursor_field: nextCursor
        items_field: items
      # $refで定義済みスキーマ → CommentPageがそのまま使われる
      - operation_id: listTaskComments
        cursor_param: after
        next_cursor_field: nextCursor
        items_field: items
