swagger: "2.0"
info:
  title: Petstore
  version: "1.0.0"
host: api.petstore.io
basePath: /v1
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json

paths:
  /pets:
    get:
      operationId: listPets
      tags:
        - pets
      summary: List all pets
      parameters:
        - name: limit
          in: query
          required: false
          type: integer
          format: int32
        - name: status
          in: query
          required: false
          type: string
      responses:
        "200":
          description: A list of pets
          schema:
            type: array
            items:
              $ref: "#/definitions/Pet"
        "400":
          description: Bad request
          schema:
            $ref: "#/definitions/Error"
        "500":
          description: Server error
          schema:
            $ref: "#/definitions/Error"
    post:
      operationId: createPet
      tags:
        - pets
      summary: Create a pet
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/CreatePetRequest"
      responses:
        "201":
          description: Pet created
          schema:
            $ref: "#/definitions/Pet"
        "400":
          description: Validation error
          schema:
            $ref: "#/definitions/ValidationError"
        "500":
          description: Server error
          schema:
            $ref: "#/definitions/Error"
  /pets/{petId}:
    get:
      operationId: getPet
      tags:
        - pets
      summary: Get a pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
          format: int64
      responses:
        "200":
          description: A pet
          schema:
            $ref: "#/definitions/Pet"
        "404":
          description: Pet not found
        "500":
          description: Server error
          schema:
            $ref: "#/definitions/Error"
    put:
      operationId: updatePet
      tags:
        - pets
      summary: Update a pet
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
          format: int64
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/CreatePetRequest"
      responses:
        "200":
          description: Pet updated
          schema:
            $ref: "#/definitions/Pet"
        "400":
          description: Validation error
          schema:
            $ref: "#/definitions/ValidationError"
        "404":
          description: Pet not found
        "500":
          description: Server error
          schema:
            $ref: "#/definitions/Error"
    delete:
      operationId: deletePet
      tags:
        - pets
      summary: Delete a pet
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
          format: int64
      responses:
        "204":
          description: Pet deleted
        "404":
          description: Pet not found
        "500":
          description: Server error
          schema:
            $ref: "#/definitions/Error"

definitions:
  Pet:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
      tag:
        type: string
      category:
        $ref: "#/definitions/Category"
      createdAt:
        type: string
        format: date-time

  Category:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string

  CreatePetRequest:
    type: object
    required:
      - name
    properties:
      name:
        type: string
      tag:
        type: string
      categoryId:
        type: integer
        format: int64

  Error:
    type: object
    required:
      - code
      - message
    properties:
      code:
        type: integer
        format: int32
      message:
        type: string

  ValidationError:
    type: object
    required:
      - message
      - errors
    properties:
      message:
        type: string
      errors:
        type: array
        items:
          $ref: "#/definitions/FieldError"

  FieldError:
    type: object
    required:
      - field
      - message
    properties:
      field:
        type: string
      message:
        type: string
