florval:
  schema_path: openapi.yaml
  output_directory: lib/api/generated

  client:
    base_url_env: API_BASE_URL
    timeout: 30000

  riverpod:
    enabled: true
    auto_invalidate: true
    pagination:
      defaults:
        cursor_param: after
        next_cursor_field: nextCursor
        items_field: items
      endpoints:
        # インラインobject → SearchPetsPageが自動生成される
        - searchPets
        # $ref → CommentPageがそのまま使われる
        - listPetComments
