florval:
  # Path to your OpenAPI spec file (required)
  schema_path: openapi.yaml

  # Output directory for generated code
  output_directory: lib/api/generated

  # The `client` block is optional and reserved: these keys are validated but
  # do NOT drive generation. The base URL, timeouts, and interceptors live on
  # the Dio you supply via apiDioProvider (see lib/main.dart), not here.
  client:
    base_url_env: API_BASE_URL
    timeout: 30000

  riverpod:
    # Generate Riverpod providers
    enabled: true
    # Invalidate same-tag GET providers after mutations
    auto_invalidate: true
    # Exclude specific mutations from auto-invalidation by operationId
    exclude_auto_invalidate:
      - deleteTask
    retry:
      max_attempts: 3
      delay: 1000

    # Cursor-based pagination endpoints
    # pagination:
    #   defaults:
    #     cursor_param: after
    #     next_cursor_field: nextCursor
    #     items_field: items
    #   endpoints:
    #     - listUsers
    #     - listPosts
    #     - operation_id: listComments
    #       cursor_param: cursor
    #       next_cursor_field: next
    #       items_field: data
