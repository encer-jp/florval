openapi: 3.1.0
info:
  title: florval Demo API
  version: 1.0.0
  description: Demo API server for florval - showcases all florval code generation features
security:
  - Bearer: []
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          nullable: true
          format: uri
        role:
          type: string
          enum:
            - admin
            - member
            - viewer
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - avatar_url
        - role
        - created_at
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user
    UnauthorizedError:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: &a1
            - todo
            - in_progress
            - done
        priority:
          type: string
          enum: &a2
            - low
            - medium
            - high
            - urgent
        assignee_id:
          type: string
          nullable: true
          format: uuid
        assignee:
          allOf:
            - $ref: "#/components/schemas/User"
            - nullable: true
        tags:
          type: array
          items:
            type: string
        due_date:
          type: string
          nullable: true
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - status
        - priority
        - assignee_id
        - assignee
        - tags
        - due_date
        - created_at
        - updated_at
    ServerError:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
      required:
        - message
        - code
    NotFoundError:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
            required:
              - field
              - message
      required:
        - message
        - errors
    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          enum: *a1
        priority:
          type: string
          nullable: true
          enum: *a2
        assignee_id:
          type: string
          nullable: true
          format: uuid
        due_date:
          type: string
          nullable: true
          format: date-time
        tags:
          type: array
          nullable: true
          items:
            type: string
      required:
        - title
    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: *a1
        priority:
          type: string
          enum: *a2
        assignee_id:
          type: string
          nullable: true
          format: uuid
        due_date:
          type: string
          nullable: true
          format: date-time
        tags:
          type: array
          items:
            type: string
          default: []
      required:
        - title
        - status
        - priority
    PaginatedUsers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
      required:
        - data
        - page
        - limit
        - total
        - total_pages
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        owner:
          $ref: "#/components/schemas/User"
        members:
          type: array
          items:
            $ref: "#/components/schemas/User"
        task_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - owner
        - members
        - task_count
        - created_at
        - updated_at
    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        member_ids:
          type: array
          items:
            type: string
            format: uuid
      required:
        - name
        - member_ids
    TaskAssignedPayload:
      type: object
      properties:
        type:
          type: string
          enum:
            - task_assigned
        task_id:
          type: string
          format: uuid
        task_title:
          type: string
        assigned_by:
          type: string
      required:
        - type
        - task_id
        - task_title
        - assigned_by
    CommentAddedPayload:
      type: object
      properties:
        type:
          type: string
          enum:
            - comment_added
        task_id:
          type: string
          format: uuid
        task_title:
          type: string
        comment_text:
          type: string
        commented_by:
          type: string
      required:
        - type
        - task_id
        - task_title
        - comment_text
        - commented_by
    ProjectInvitedPayload:
      type: object
      properties:
        type:
          type: string
          enum:
            - project_invited
        project_id:
          type: string
          format: uuid
        project_name:
          type: string
        invited_by:
          type: string
      required:
        - type
        - project_id
        - project_name
        - invited_by
    NotificationPayload:
      oneOf:
        - $ref: "#/components/schemas/TaskAssignedPayload"
        - $ref: "#/components/schemas/CommentAddedPayload"
        - $ref: "#/components/schemas/ProjectInvitedPayload"
      discriminator:
        propertyName: type
        mapping:
          task_assigned: "#/components/schemas/TaskAssignedPayload"
          comment_added: "#/components/schemas/CommentAddedPayload"
          project_invited: "#/components/schemas/ProjectInvitedPayload"
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - task_assigned
            - comment_added
            - project_invited
        payload:
          $ref: "#/components/schemas/NotificationPayload"
        created_at:
          type: string
          format: date-time
        is_read:
          type: boolean
      required:
        - id
        - type
        - payload
        - created_at
        - is_read
    UploadResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        size:
          type: integer
        content_type:
          type: string
        url:
          type: string
          format: uri
        uploaded_at:
          type: string
          format: date-time
      required:
        - id
        - filename
        - size
        - content_type
        - url
        - uploaded_at
    BadRequestError:
      type: object
      properties:
        message:
          type: string
      required:
        - message
  parameters: {}
paths:
  /auth/login:
    post:
      tags:
        - auth
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
  /tasks:
    get:
      tags:
        - tasks
      operationId: listTasks
      security:
        - Bearer: []
      parameters:
        - schema:
            type: string
            enum: *a1
          required: false
          name: status
          in: query
        - schema:
            type: string
            enum: *a2
          required: false
          name: priority
          in: query
        - schema:
            type: string
            format: uuid
          required: false
          name: assignee_id
          in: query
        - schema:
            type: string
          required: false
          name: trigger_error
          in: query
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerError"
    post:
      tags:
        - tasks
      operationId: createTask
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
  /tasks/{id}:
    get:
      tags:
        - tasks
      operationId: getTask
      security:
        - Bearer: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
    put:
      tags:
        - tasks
      operationId: updateTask
      security:
        - Bearer: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
    delete:
      tags:
        - tasks
      operationId: deleteTask
      security:
        - Bearer: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "204":
          description: Task deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
  /users:
    get:
      tags:
        - users
      operationId: listUsers
      security:
        - Bearer: []
      parameters:
        - schema:
            type: integer
            minimum: 1
            default: 1
          required: false
          name: page
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          required: false
          name: limit
          in: query
        - schema:
            type: string
          required: false
          name: search
          in: query
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
  /users/{id}:
    get:
      tags:
        - users
      operationId: getUser
      security:
        - Bearer: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
  /projects:
    get:
      tags:
        - projects
      operationId: listProjects
      security:
        - Bearer: []
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
    post:
      tags:
        - projects
      operationId: createProject
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
  /projects/{id}:
    get:
      tags:
        - projects
      operationId: getProject
      security:
        - Bearer: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Project detail with owner and members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
  /notifications:
    get:
      tags:
        - notifications
      operationId: listNotifications
      security:
        - Bearer: []
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
  /uploads:
    post:
      tags:
        - uploads
      operationId: uploadFile
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
              required:
                - file
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"
        "400":
          description: No file provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
