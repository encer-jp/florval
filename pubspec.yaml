name: florval
description: >-
  Generate type-safe Flutter/Dart API clients from OpenAPI specs
  with status-code Union types, Riverpod integration, and cursor-based pagination.
version: 0.1.1
homepage: https://github.com/encer-jp/florval
repository: https://github.com/encer-jp/florval
issue_tracker: https://github.com/encer-jp/florval/issues
topics:
  - openapi
  - code-generation
  - dio
  - riverpod
  - freezed

environment:
  sdk: ^3.9.0

dependencies:
  openapi_spec_plus: ^0.6.0
  yaml: ^3.1.0
  args: ^2.4.0
  path: ^1.9.0
  recase: ^4.1.0

dev_dependencies:
  test: ^1.24.0
  lints: ^5.0.0
