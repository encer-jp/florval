openapi: "3.1.0"
info:
  title: Swagger Petstore
  description: Petstore v3 API for florval verification
  version: "1.0.0"

servers:
  - url: https://petstore3.swagger.io/api/v3

paths:
  /pet/findByStatus:
    get:
      operationId: findPetsByStatus
      tags:
        - pet
      summary: Finds Pets by status
      description: Multiple status values can be provided with comma separated strings
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - available
              - pending
              - sold
            default: available
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid status value

  /pet/{petId}:
    get:
      operationId: getPetById
      tags:
        - pet
      summary: Find pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid ID supplied
        "404":
          description: Pet not found

    delete:
      operationId: deletePet
      tags:
        - pet
      summary: Deletes a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Pet deleted successfully
        "400":
          description: Invalid pet value
        "404":
          description: Pet not found

  /pet:
    post:
      operationId: addPet
      tags:
        - pet
      summary: Add a new pet to the store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid input
        "422":
          description: Validation exception

  # ── Pagination examples ──────────────────────────────────

  # Pattern 1: inline object → wrapper model auto-generated
  /pet/search:
    get:
      operationId: searchPets
      tags:
        - pet
      summary: Search pets with cursor-based pagination (inline response)
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: after
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paginated search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Pet"
                  nextCursor:
                    type: string
                  totalCount:
                    type: integer
        "400":
          description: Invalid search query

  # Pattern 2: $ref → existing schema used as-is
  /pet/{petId}/comments:
    get:
      operationId: listPetComments
      tags:
        - pet
      summary: List comments on a pet with cursor-based pagination ($ref response)
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: after
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentPage"
        "404":
          description: Pet not found

    post:
      operationId: addPetComment
      tags:
        - pet
      summary: Add a comment to a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          description: Pet not found

components:
  schemas:
    Pet:
      type: object
      required:
        - name
        - photoUrls
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        photoUrls:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        status:
          type: string
          description: pet status in the store
          enum:
            - available
            - pending
            - sold

    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    Comment:
      type: object
      required:
        - id
        - body
      properties:
        id:
          type: integer
          format: int64
        body:
          type: string
        author:
          type: string
        createdAt:
          type: string
          format: date-time

    CommentPage:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        nextCursor:
          type: string
        totalCount:
          type: integer

    CreateCommentRequest:
      type: object
      required:
        - body
      properties:
        body:
          type: string
